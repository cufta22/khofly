name = "khofly"
pages_build_output_dir = "./build/client"
compatibility_date = "2024-04-26"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "development"
HOST = "http://localhost:3000"
SEARXNG_URL_EU1 = "https://searxng-eu1.khofly.com"
SEARXNG_URL_US1 = "https://searxng-us1.khofly.com"
NOMINATIM_URL = "https://nominatim.openstreetmap.org"
OPEN_WEATHER_URL = "https://api.openweathermap.org"
OPEN_WEATHER_API_KEY = ""
ANALYZE = 0 # 0 - false, 1 - true, for rollup-plugin-visualizer
IS_SELF_HOST = 1
APP_NAME = "Khofly"
HOST_TARGET = "cloudflare" # node, vercel, cloudflare
SEARXNG_URL_SELF_HOST = "" # URL for SearXNG instance